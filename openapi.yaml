openapi: 3.0.3
info:
  title: Product Service API
  description: REST API for managing products in the AWS Shop backend.
  version: 1.0.0

servers:
  - url: https://byb2npd55e.execute-api.eu-central-1.amazonaws.com/prod
    description: AWS API Gateway (production)

paths:
  /products:
    get:
      summary: Get all products
      operationId: getProductsList
      responses:
        '200':
          description: A list of all products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              example:
                - id: "1"
                  title: "ProductOne"
                  description: "Short Product Description1"
                  price: 24.0
                  count: 8
                - id: "2"
                  title: "ProductTitle"
                  description: "Short Product Description7"
                  price: 15.0
                  count: 3
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/{productId}:
    get:
      summary: Get a product by ID
      operationId: getProductsById
      parameters:
        - name: productId
          in: path
          required: true
          description: The unique identifier of the product
          schema:
            type: string
          example: "1"
      responses:
        '200':
          description: The requested product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: "1"
                title: "ProductOne"
                description: "Short Product Description1"
                price: 24.0
                count: 8
        '400':
          description: Bad request — productId is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "productId is required"
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Product not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          description: Unique product identifier
          example: "1"
        title:
          type: string
          description: Product title
          example: "ProductOne"
        description:
          type: string
          description: Short product description
          example: "Short Product Description1"
        price:
          type: number
          format: double
          description: Product price
          example: 24.0
        count:
          type: integer
          description: Stock count
          example: 8

    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: "Product not found"
