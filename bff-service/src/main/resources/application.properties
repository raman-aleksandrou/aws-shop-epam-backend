# Elastic Beanstalk proxies to port 5000, so that is the default.
# Locally the .env file sets PORT=3000 to override it.
server.port=${PORT:5000}
spring.application.name=bff-service

# Let the proxy forward error responses untouched instead of Spring's error page.
server.error.whitelabel.enabled=false

# TTL (seconds) for the BFF cache of the getProductsList response. Expires in 2 minutes.
bff.products-cache.ttl-seconds=120
